name: Daily Recruit Analysis

on:
  schedule:
    # 매일 23:30 KST = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write secrets.toml
        run: |
          mkdir -p .streamlit
          echo "$RECRUIT_SECRETS_TOML" > .streamlit/secrets.toml
        env:
          RECRUIT_SECRETS_TOML: ${{ secrets.RECRUIT_SECRETS_TOML }}

      - name: Analyze AI연구원
        run: python bulk_analyze.py AI연구원
        continue-on-error: true

      - name: Analyze 개발자
        run: python bulk_analyze.py 개발자
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: rm -rf .streamlit/secrets.toml
