name: Keep Streamlit App Awake

on:
  schedule:
    # 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC = KST 09:00, 15:00, 21:00, 03:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        run: |
          URL="https://onesglobal-recruit.streamlit.app"
          echo "Pinging $URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 60 "$URL")
          echo "HTTP $HTTP_CODE"
          # 2xx/3xx 응답이면 성공, 그 외는 실패
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ App is awake"
          else
            echo "❌ Unexpected response"
            exit 1
          fi
