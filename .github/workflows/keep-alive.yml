name: Keep Streamlit App Awake

on:
  schedule:
    # 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC = KST 09:00, 15:00, 21:00, 03:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        run: |
          URL="https://onesglobal-recruit.streamlit.app"
          echo "Pinging $URL"
          # 리다이렉트 추적 안 함: 인증벽 있는 앱은 303 → auth 페이지 → 무한 루프 발생.
          # Streamlit 엣지에 요청이 닿는 것 자체가 traffic 카운트라 303만 받아도 sleep 방지 OK.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "HTTP $HTTP_CODE"
          # 1xx~3xx 응답이면 엣지 도달 성공
          if [ "$HTTP_CODE" -ge 100 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Ping reached Streamlit edge — sleep timer reset"
          else
            echo "❌ Unexpected response: $HTTP_CODE"
            exit 1
          fi
