name: Keep Streamlit App Awake

on:
  schedule:
    # 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC = KST 09:00, 15:00, 21:00, 03:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app (real container hit)
        run: |
          URL="https://onesglobal-recruit.streamlit.app"
          COOKIES=$(mktemp)
          echo "Pinging $URL with cookie jar"
          # Streamlit Cloud 세션 쿠키 받고 redirect 따라가야 실제 앱 컨테이너에 도달.
          # 쿠키 없이 -L 사용 시 무한 루프, 쿠키 없이 단순 GET은 엣지에서 303만 받고 끝.
          HTTP_CODE=$(curl -sL -c "$COOKIES" -b "$COOKIES" -o /dev/null \
            -w "%{http_code}" --max-time 60 "$URL")
          echo "Final HTTP: $HTTP_CODE"
          rm -f "$COOKIES"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ App container reached — sleep timer reset"
          else
            echo "❌ Unexpected response: $HTTP_CODE"
            exit 1
          fi
